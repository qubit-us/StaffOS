version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: staffos_db
    environment:
      POSTGRES_DB: staffos
      POSTGRES_USER: staffos_user
      POSTGRES_PASSWORD: staffos_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffos_user -d staffos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: staffos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: staffos_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://staffos_user:staffos_pass@postgres:5432/staffos
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-staffos_super_secret_jwt_key_change_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: staffos_frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
  uploads:
